<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapılacaklar Listesi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="Yeni görev ekle..." autofocus>
            <button type="submit">Ekle</button>
        </form>
        <div class="columns">
            <div class="column">
                <h2>Yapılacaklar</h2>
                <ul id="pending-list"></ul>
                <p class="empty-msg" id="pending-empty">Henüz görev yok.</p>
            </div>
            <div class="column">
                <h2>Tamamlananlar</h2>
                <ul id="done-list"></ul>
                <p class="empty-msg" id="done-empty">Tamamlanan görev yok.</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://twdwhkcyxvehgzmuvkfq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3ZHdoa2N5eHZlaGd6bXV2a2ZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNDg1NTYsImV4cCI6MjA4OTgyNDU1Nn0.o8ZOQEflMEo_KXqSAM3dbFEof4CFQRPSW4CqUeAnpbI';
        const API = `${SUPABASE_URL}/rest/v1/todos`;
        const headers = {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
        };

        const form = document.getElementById('todo-form');
        const input = document.getElementById('todo-input');
        const pendingList = document.getElementById('pending-list');
        const doneList = document.getElementById('done-list');
        const pendingEmpty = document.getElementById('pending-empty');
        const doneEmpty = document.getElementById('done-empty');

        function updateEmpty() {
            pendingEmpty.style.display = pendingList.children.length === 0 ? 'block' : 'none';
            doneEmpty.style.display = doneList.children.length === 0 ? 'block' : 'none';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function isOverdue(dateStr) {
            if (!dateStr) return false;
            return new Date(dateStr) < new Date();
        }

        function updateOverdue() {
            document.querySelectorAll('li[data-date]').forEach(li => {
                if (!li.classList.contains('done')) {
                    li.classList.toggle('overdue', isOverdue(li.dataset.date));
                } else {
                    li.classList.remove('overdue');
                }
            });
        }

        setInterval(updateOverdue, 60000);

        function moveToCorrectList(li) {
            if (li.classList.contains('done')) {
                doneList.appendChild(li);
            } else {
                pendingList.appendChild(li);
            }
            updateEmpty();
        }

        // Supabase API fonksiyonları
        async function dbInsert(text, date) {
            const body = { text, done: false };
            if (date) body.date = new Date(date).toISOString();
            const res = await fetch(API, { method: 'POST', headers, body: JSON.stringify(body) });
            const data = await res.json();
            return data[0];
        }

        async function dbUpdate(id, fields) {
            if (fields.date) fields.date = new Date(fields.date).toISOString();
            await fetch(`${API}?id=eq.${id}`, { method: 'PATCH', headers, body: JSON.stringify(fields) });
        }

        async function dbDelete(id) {
            await fetch(`${API}?id=eq.${id}`, { method: 'DELETE', headers });
        }

        async function dbFetchAll() {
            const res = await fetch(`${API}?select=*&order=created_at.asc`, { headers });
            return res.json();
        }

        function renderTodo(todo) {
            const li = document.createElement('li');
            li.dataset.id = todo.id;
            if (todo.done) li.classList.add('done');
            if (todo.date) {
                li.dataset.date = todo.date;
                if (!todo.done && isOverdue(todo.date)) li.classList.add('overdue');
            }

            const content = document.createElement('div');
            content.className = 'todo-content';

            const span = document.createElement('span');
            span.className = 'todo-text';
            span.textContent = todo.text;
            span.addEventListener('click', async () => {
                const newDone = !li.classList.contains('done');
                li.classList.toggle('done');
                li.classList.remove('overdue');
                moveToCorrectList(li);
                updateOverdue();
                await dbUpdate(todo.id, { done: newDone });
            });

            content.appendChild(span);

            const dateEl = document.createElement('span');
            dateEl.className = 'todo-date';
            dateEl.textContent = todo.date ? formatDate(todo.date) : '';
            content.appendChild(dateEl);

            const actions = document.createElement('div');
            actions.className = 'actions';

            const dateBtn = document.createElement('button');
            dateBtn.textContent = '🕐';
            dateBtn.className = 'date-btn';
            dateBtn.title = 'Tarih/saat ekle';
            const hiddenDate = document.createElement('input');
            hiddenDate.type = 'datetime-local';
            hiddenDate.className = 'hidden-date-input';
            if (todo.date) hiddenDate.value = new Date(todo.date).toISOString().slice(0, 16);
            dateBtn.addEventListener('click', () => {
                hiddenDate.showPicker();
            });
            hiddenDate.addEventListener('change', async () => {
                li.dataset.date = hiddenDate.value;
                dateEl.textContent = formatDate(hiddenDate.value);
                updateOverdue();
                await dbUpdate(todo.id, { date: hiddenDate.value });
            });

            const editBtn = document.createElement('button');
            editBtn.textContent = '✎';
            editBtn.className = 'edit-btn';
            editBtn.addEventListener('click', () => {
                const editInput = document.createElement('input');
                editInput.type = 'text';
                editInput.className = 'edit-input';
                editInput.value = span.textContent;

                li.classList.add('editing');
                li.insertBefore(editInput, actions);
                editInput.focus();

                function saveEdit() {
                    const newText = editInput.value.trim();
                    if (newText) {
                        span.textContent = newText;
                        dbUpdate(todo.id, { text: newText });
                    }
                    li.classList.remove('editing');
                    editInput.remove();
                }

                editInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') saveEdit();
                    if (e.key === 'Escape') {
                        li.classList.remove('editing');
                        editInput.remove();
                    }
                });
                editInput.addEventListener('blur', saveEdit);
            });

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '✕';
            deleteBtn.className = 'delete-btn';
            deleteBtn.addEventListener('click', async () => {
                li.remove();
                updateEmpty();
                await dbDelete(todo.id);
            });

            actions.appendChild(dateBtn);
            actions.appendChild(hiddenDate);
            actions.appendChild(editBtn);
            actions.appendChild(deleteBtn);
            li.appendChild(content);
            li.appendChild(actions);

            if (todo.done) {
                doneList.appendChild(li);
            } else {
                pendingList.appendChild(li);
            }
            updateEmpty();
        }

        // Sayfa yüklenince Supabase'den verileri çek
        (async () => {
            const todos = await dbFetchAll();
            todos.forEach(renderTodo);
        })();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            const todo = await dbInsert(text, '');
            renderTodo(todo);
        });
    </script>
</body>
</html>
